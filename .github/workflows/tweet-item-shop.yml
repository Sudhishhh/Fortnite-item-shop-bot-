name: Tweet Fortnite Item Shop

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

jobs:
  tweet-shop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate image and tweet
        env:
          FNBR_API_KEY: ${{ secrets.FNBR_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER: ${{ secrets.TWITTER_BEARER }}
          TWITTER_HANDLE: ${{ secrets.TWITTER_HANDLE }}
          ENABLE_TWEET: "true"
          SHOW_IMAGE_PREVIEW: "false"
          FAIL_ON_TWEET_ERROR: "true"
          TWEET_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && format('manual-run-{0}', github.run_number) || '' }}
        run: python bot.py
